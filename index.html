<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PulsePeak — Personal Fitness Companion</title>
    <meta
      name="description"
      content="PulsePeak is your personal fitness companion: personalized workouts, a smart weekly plan, nutrition, recovery and progress tracking in one premium app."
    />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" href="/brand/pulsepeak_icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA / mobile web app -->
    <meta name="theme-color" content="#20272b" />
    <!-- Theme bootstrap: honor the stored preference before first paint (no flash). External for CSP. -->
    <script src="/theme-bootstrap.js"></script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PulsePeak" />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PulsePeak" />
    <meta property="og:title" content="PulsePeak — Personal Fitness Companion" />
    <meta
      property="og:description"
      content="Personalized workouts, a smart weekly plan, nutrition, recovery and progress — your personal fitness companion."
    />
    <meta property="og:image" content="/brand/pulsepeak-main-logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PulsePeak — Personal Fitness Companion" />
    <meta
      name="twitter:description"
      content="Personalized workouts, a smart weekly plan, nutrition, recovery and progress — your personal fitness companion."
    />
    <meta name="twitter:image" content="/brand/pulsepeak-main-logo.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
