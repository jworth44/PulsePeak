services:
  - type: web
    name: pulsepeak-staging
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    # Persistent disk so the JSON DB survives deploys/restarts.
    # NOTE: Render disks require a paid instance (Starter+); free web services
    # cannot mount a disk. A service with a disk runs a single instance (no
    # horizontal scaling) — fine at this stage; migrate to Postgres for scale.
    disk:
      name: pulsepeak-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22.20.0
      - key: APP_ORIGIN
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: PULSEPEAK_DB_PATH
        value: /data/pulsepeak-db.json
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_YEARLY_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PREMIUM_PRICE_CENTS
        value: "1499"
      - key: STRIPE_PREMIUM_YEARLY_PRICE_CENTS
        value: "11999"
      - key: STRIPE_PREMIUM_CURRENCY
        value: usd
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
